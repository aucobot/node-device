name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.next_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "$latest_tag" ]]; then
            next="1.0.0"
          else
            ver="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$ver"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            next="${major}.${minor}.$((patch + 1))"
          fi

          echo "latest_tag=${latest_tag:-none}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${next} (from ${latest_tag:-none})"

  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            dist: dist:win
          - os: macos-latest
            platform: mac
            dist: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Bump package.json version
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const version = process.env.NEXT_VERSION;
          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
        env:
          NEXT_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm run ${{ matrix.dist }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-device-${{ matrix.platform }}-${{ needs.prepare.outputs.version }}
          path: release/*
          if-no-files-found: error

  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-device-win-${{ needs.prepare.outputs.version }}
          path: artifacts/win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-device-mac-${{ needs.prepare.outputs.version }}
          path: artifacts/mac

      - name: Bump package.json version
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const version = process.env.NEXT_VERSION;
          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
        env:
          NEXT_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Commit release version
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --staged --quiet; then
            echo "package.json already at ${{ needs.prepare.outputs.version }}, skipping commit"
          else
            git commit -m "chore(release): v${{ needs.prepare.outputs.version }}"
            git push origin main
          fi

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/win/*
            artifacts/mac/*
          body: |
            Desktop installer for **Aucobot Node** ${{ needs.prepare.outputs.version }}.

            | Platform | File |
            | -------- | ---- |
            | Windows | `.exe` installer (NSIS) |
            | macOS | `.dmg` disk image |

            **Pairing:** create an invite code in AucoBot **Companion Nodes**, then connect from the app.
